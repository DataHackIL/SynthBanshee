# Speaker persona — Female social worker, age 30–45, instance 003
# Azure SSML-perturbed variant of HilaNeural for Elephant in the Room.
# Differentiated from SW_F_30-45_001 by higher pitch and slightly slower rate.
#
# voice_family remains he-IL-HilaNeural (same underlying TTS model);
# the identity differentiation comes from prosody baseline offsets.

speaker_id: SW_F_30-45_003
role: VIC
gender: female
age_range: "30-45"
context: elephant_in_the_room

tts_voice_id: he-IL-HilaNeural
tts_provider: azure
voice_family: he-IL-HilaNeural

prosody_baseline:
  rate: 0.95                         # Slower than 001's 1.0
  pitch_hz: 210                      # Higher than 001's 200 Hz
  volume_db: 0

# Azure <mstts:express-as> + prosody adjustments per intensity level.
style_map:
  1:
    style: "General"
    rate_multiplier: 0.95           # M15: consensus Calm; variant: deliberately slow
    pitch_delta_st: 0               # #64: was -2 (=-12%); capped to consensus range
    volume_delta_db: 0
    rms_target_dbfs: -26
  2:
    style: "General"
    rate_multiplier: 0.98           # M15: consensus Neutral; variant: measured
    pitch_delta_st: 0               # #64: was -1; neutral baseline
    volume_delta_db: 0
    rms_target_dbfs: -27
  3:
    style: "General"
    rate_multiplier: 0.92           # M15: consensus Irritation; variant: very deliberate
    pitch_delta_st: +1              # #64: was +2; reduced to ~6% (consensus 0–5%)
    volume_delta_db: +3
    rms_target_dbfs: -28
  4:
    style: "General"
    rate_multiplier: 0.95           # M15: consensus Anger; variant: slow/controlled
    pitch_delta_st: +2              # #64: was +4 (=24%); reduced to ~12% (consensus 2–7%)
    volume_delta_db: +5
    rms_target_dbfs: -29
  5:
    style: "General"
    rate_multiplier: 1.10           # M15: consensus Shouting; variant: high panic
    pitch_delta_st: +2              # #64: was +6 (=36%); reduced to ~12% (consensus 4–10%)
    volume_delta_db: +8
    rms_target_dbfs: -30

disfluency:
  filled_pause_prob: 0.04
  false_start_prob: 0.04
  truncation_prob: 0.05

split: train
