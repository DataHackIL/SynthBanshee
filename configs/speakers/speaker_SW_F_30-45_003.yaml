# Speaker persona — Female social worker, age 30–45, instance 003
# Azure SSML-perturbed variant of HilaNeural for Elephant in the Room.
# Differentiated from SW_F_30-45_001 by higher pitch and slightly slower rate.
#
# voice_family remains he-IL-HilaNeural (same underlying TTS model);
# the identity differentiation comes from prosody baseline offsets.

speaker_id: SW_F_30-45_003
role: VIC
gender: female
age_range: "30-45"
context: elephant_in_the_room

tts_voice_id: he-IL-HilaNeural
tts_provider: azure
voice_family: he-IL-HilaNeural

prosody_baseline:
  rate: 0.95                         # Slower than 001's 1.0
  pitch_hz: 210                      # Higher than 001's 200 Hz
  volume_db: 0

# Azure <mstts:express-as> + prosody adjustments per intensity level.
style_map:
  1:
    style: "General"
    rate_multiplier: 0.97           # M15: female Calm rate
    pitch_delta_st: -2              # M15: female pitch -3% to +2%
    volume_delta_db: 0
    rms_target_dbfs: -26
  2:
    style: "General"
    rate_multiplier: 1.0            # M15: female Neutral rate
    pitch_delta_st: -1              # M15: female pitch -2% to +3%
    volume_delta_db: 0
    rms_target_dbfs: -27
  3:
    style: "General"
    rate_multiplier: 0.95           # M15: female Irritation rate; SW slows
    pitch_delta_st: +1              # M15: female pitch 0% to +5%
    volume_delta_db: +3
    rms_target_dbfs: -28
  4:
    style: "General"
    rate_multiplier: 0.98           # M15: female Anger rate; SW controlled
    pitch_delta_st: +3              # M15: female pitch +2% to +7%
    volume_delta_db: +5
    rms_target_dbfs: -29
  5:
    style: "General"
    rate_multiplier: 1.08           # M15: female Shouting rate; panic
    pitch_delta_st: +5              # M15: female pitch +4% to +10%
    volume_delta_db: +7
    rms_target_dbfs: -30

disfluency:
  filled_pause_prob: 0.04
  false_start_prob: 0.04
  truncation_prob: 0.05

split: train
