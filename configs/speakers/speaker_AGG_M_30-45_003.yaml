# Speaker persona — Male aggressor, age 30–45, instance 003
# Azure SSML-perturbed variant of AvriNeural — shifted prosody baseline
# produces a perceptually distinct voice identity (deeper, slower).
#
# voice_family remains he-IL-AvriNeural (same underlying TTS model);
# the identity differentiation comes from prosody baseline offsets.

speaker_id: AGG_M_30-45_003
role: AGG
gender: male
age_range: "30-45"
context: she_proves

tts_voice_id: he-IL-AvriNeural
tts_provider: azure
voice_family: he-IL-AvriNeural

prosody_baseline:
  rate: 0.95                        # Slower, more deliberate (vs 001's 1.05)
  pitch_hz: 95                      # Deeper voice (vs 001's 115 Hz)
  volume_db: +1

style_map:
  1:
    style: "General"
    rate_multiplier: 0.95           # M15: consensus Calm [-6%,+2%]; variant: deliberate
    pitch_delta_st: 0               # M15: male pitch -3% to +2%
    volume_delta_db: 0
    rms_target_dbfs: -28
  2:
    style: "General"
    rate_multiplier: 1.0            # M15: consensus Neutral [0%,+4%]; variant: baseline
    pitch_delta_st: 0               # M15: male pitch stays flat
    volume_delta_db: +1
    rms_target_dbfs: -25
  3:
    style: "General"
    rate_multiplier: 1.05           # M15: consensus Irritation [+2%,+8%]; variant: mid
    pitch_delta_st: +1              # M15: male pitch -1% to +3%
    volume_delta_db: +3
    rms_target_dbfs: -22
  4:
    style: "General"
    rate_multiplier: 1.09           # M15: consensus Anger [+4%,+12%]; variant: mid-high
    pitch_delta_st: +2              # M15: male pitch -1% to +5%
    volume_delta_db: +8
    rms_target_dbfs: -19
  5:
    style: "General"
    rate_multiplier: 1.13           # M15: consensus Shouting [+8%,+15%]; variant: mid
    pitch_delta_st: +2              # M15: male pitch 0% to +5%; hard cap
    volume_delta_db: +12
    rms_target_dbfs: -15

disfluency:
  filled_pause_prob: 0.06
  false_start_prob: 0.03
  truncation_prob: 0.02

split: train
