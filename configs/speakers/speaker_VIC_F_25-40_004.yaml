# Speaker persona — Female victim, age 25–40, instance 004
# Azure SSML-perturbed variant of HilaNeural — shifted prosody baseline
# produces a perceptually distinct voice identity (lower pitch, faster).
#
# voice_family remains he-IL-HilaNeural (same underlying TTS model);
# the identity differentiation comes from prosody baseline offsets.

speaker_id: VIC_F_25-40_004
role: VIC
gender: female
age_range: "25-40"
context: she_proves

tts_voice_id: he-IL-HilaNeural
tts_provider: azure
voice_family: he-IL-HilaNeural

prosody_baseline:
  rate: 1.0                         # Slightly faster than 002's 0.95
  pitch_hz: 185                     # Lower than 002's 210 Hz
  volume_db: 0

style_map:
  1:
    style: "General"
    rate_multiplier: 0.96           # M15: consensus Calm [-6%,+2%]; variant: hesitant
    pitch_delta_st: 0               # #64: was -2 (=-12%); capped to consensus range
    volume_delta_db: 0
    rms_target_dbfs: -26
  2:
    style: "General"
    rate_multiplier: 0.97           # M15: consensus Neutral [0%,+4%]; variant: guarded
    pitch_delta_st: 0               # #64: was -1; neutral baseline
    volume_delta_db: 0
    rms_target_dbfs: -27
  3:
    style: "General"
    rate_multiplier: 0.93           # M15: consensus Irritation; variant: slow
    pitch_delta_st: +1              # #64: was +2; reduced to ~6% (consensus 0–5%)
    volume_delta_db: +3
    rms_target_dbfs: -28
  4:
    style: "General"
    rate_multiplier: 0.94           # M15: consensus Anger; variant: slow pleading
    pitch_delta_st: +2              # #64: was +4 (=24%); reduced to ~12% (consensus 2–7%)
    volume_delta_db: +5
    rms_target_dbfs: -29
  5:
    style: "General"
    rate_multiplier: 1.06           # M15: consensus Shouting; variant: panic
    pitch_delta_st: +3              # #64: was +6 (=36%); reduced to ~18% (consensus 4–10%)
    volume_delta_db: +7
    rms_target_dbfs: -30

disfluency:
  filled_pause_prob: 0.10
  false_start_prob: 0.05
  truncation_prob: 0.03

split: train
