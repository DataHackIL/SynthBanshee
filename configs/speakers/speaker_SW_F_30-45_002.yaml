# Speaker persona — Female social worker, age 30–45, instance 002
# Google Cloud TTS Chirp 3 HD variant for Elephant in the Room.
# Provides backend diversity for the Elephant project's female victim role.

speaker_id: SW_F_30-45_002
role: VIC
gender: female
age_range: "30-45"
context: elephant_in_the_room

tts_voice_id: he-IL-Chirp3-HD-Achernar
tts_provider: google
voice_family: he-IL-Chirp3-HD-Achernar

prosody_baseline:
  rate: 1.0
  pitch_hz: 195
  volume_db: 0

# Google does not support <mstts:express-as>; style field is metadata only.
style_map:
  1:
    style: "General"
    rate_multiplier: 0.98           # M15: consensus Calm; variant: professional baseline
    pitch_delta_st: -1              # M15: female pitch -3% to +2%; variant: mild
    volume_delta_db: 0
    rms_target_dbfs: -26
  2:
    style: "General"
    rate_multiplier: 1.01           # M15: consensus Neutral [0%,+4%]; variant: slightly quick
    pitch_delta_st: 0               # M15: female pitch -2% to +3%; variant: neutral
    volume_delta_db: 0
    rms_target_dbfs: -27
  3:
    style: "General"
    rate_multiplier: 0.94           # M15: consensus Irritation; variant: deliberate slowing
    pitch_delta_st: +1              # M15: female pitch 0% to +5%
    volume_delta_db: +2
    rms_target_dbfs: -28
  4:
    style: "General"
    rate_multiplier: 0.96           # M15: consensus Anger; variant: controlled
    pitch_delta_st: +3              # M15: female pitch +2% to +7%
    volume_delta_db: +4
    rms_target_dbfs: -29
  5:
    style: "General"
    rate_multiplier: 1.06           # M15: consensus Shouting; variant: panic
    pitch_delta_st: +5              # M15: female pitch +4% to +10%
    volume_delta_db: +6
    rms_target_dbfs: -30

disfluency:
  filled_pause_prob: 0.03
  false_start_prob: 0.03
  truncation_prob: 0.04

split: train
