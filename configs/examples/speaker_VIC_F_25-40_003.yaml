# Speaker persona — Female victim, age 25–40, instance 003
# Google Cloud TTS Chirp 3 HD variant — provides backend diversity.
#
# Verify the voice ID against the current Google catalog:
#   gcloud text-to-speech voices list --language-code=he-IL --filter="name~Chirp3"
#
# This speaker uses tts_provider: google so TTSRenderer routes synthesis
# through GoogleProvider (requires [google-tts] extra and
# GOOGLE_APPLICATION_CREDENTIALS env var).

speaker_id: VIC_F_25-40_003
role: VIC
gender: female
age_range: "25-40"
context: she_proves

# --- Google Cloud TTS voice ---
tts_voice_id: he-IL-Chirp3-HD-Achernar
tts_provider: google
voice_family: he-IL-Chirp3-HD-Achernar

# --- Baseline prosody ---
prosody_baseline:
  rate: 0.97
  pitch_hz: 200
  volume_db: 0

# --- Style / emotional range ---
# Google does not support <mstts:express-as>; style field is metadata only.
# M2a: VIC pitch lowered to adult range (-4 → -1 st across I1 → I5).
style_map:
  1:
    style: "General"
    rate_multiplier: 0.98           # M15: consensus Calm [-6%,+2%]; variant: near-neutral
    pitch_delta_st: 0               # #64: was -1; neutral baseline
    volume_delta_db: 0
    rms_target_dbfs: -26
  2:
    style: "General"
    rate_multiplier: 0.99           # M15: consensus Neutral [0%,+4%]; variant: near-baseline
    pitch_delta_st: 0               # M15: female pitch -2% to +3%; variant: neutral
    volume_delta_db: 0
    rms_target_dbfs: -27
  3:
    style: "General"
    rate_multiplier: 0.96           # M15: consensus Irritation; variant: moderate slowing
    pitch_delta_st: +1              # #64: unchanged; ~6% (consensus 0–5%)
    volume_delta_db: +2
    rms_target_dbfs: -28
  4:
    style: "General"
    rate_multiplier: 0.97           # M15: consensus Anger; variant: less extreme slowing
    pitch_delta_st: +2              # #64: was +3; reduced to ~12% (consensus 2–7%)
    volume_delta_db: +4
    rms_target_dbfs: -29
  5:
    style: "General"
    rate_multiplier: 1.08           # M15: consensus Shouting; variant: higher panic speed
    pitch_delta_st: +3              # #64: was +5 (=30%); reduced to ~18% (consensus 4–10%)
    volume_delta_db: +6
    rms_target_dbfs: -30

# --- Disfluency profile ---
disfluency:
  filled_pause_prob: 0.12
  false_start_prob: 0.06
  truncation_prob: 0.03

# --- Split assignment ---
split: train
