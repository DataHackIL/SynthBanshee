# Speaker persona — Male aggressor, age 30–45, instance 001
# Used in She-Proves scenes (domestic violence context).
#
# Speaker personas define the TTS rendering parameters for a consistent
# "character" across multiple clips. Speaker IDs must be assigned to exactly
# one dataset split (train/val/test) at generation time — never shared across splits.

speaker_id: AGG_M_30-45_001
role: AGG                           # AGG | VIC | BYS | NEU
gender: male
age_range: "30-45"
context: she_proves                 # she_proves | elephant_in_the_room | both

# --- Azure TTS voice ---
# Primary voice. Must be a supported he-IL neural voice.
tts_voice_id: he-IL-AvriNeural
tts_provider: azure                 # azure | google
voice_family: he-IL-AvriNeural

# --- Baseline prosody ---
# These are the neutral/baseline parameters. Scene configs apply
# additional per-segment variation on top of these values.
prosody_baseline:
  rate: 1.05                        # Slightly fast baseline (common in tense speakers)
  pitch_hz: 115                     # Lower male fundamental (Hz); Azure uses relative adjustments
  volume_db: 0                      # Baseline volume (dB relative to TTS default)

# --- Style / emotional range ---
# Maps intensity levels (1–5) to Azure mstts:express-as style + prosody adjustments.
# Claude Code: use these when building SSML per segment.
style_map:
  1:                                # Low tension — calm surface, controlled
    style: "General"
    rate_multiplier: 0.97           # M15: consensus Calm [-6%,+2%]; variant: slightly below mid
    pitch_delta_st: 0               # M15: male pitch -3% to +2% at I1
    volume_delta_db: 0
    rms_target_dbfs: -28            # M3: quiet baseline
  2:                                # Moderate — slight edge, clipped responses
    style: "General"
    rate_multiplier: 1.03           # M15: consensus Neutral [0%,+4%]; variant: upper-mid
    pitch_delta_st: 0               # M15: male pitch -2% to +2%; AGG anger → rate not pitch
    volume_delta_db: 0
    rms_target_dbfs: -25            # M3: +3 dB
  3:                                # Active conflict — raised voice, contemptuous
    style: "General"
    rate_multiplier: 1.06           # M15: consensus Irritation [+2%,+8%]; variant: mid-high
    pitch_delta_st: +1              # M15: male pitch -1% to +3%
    volume_delta_db: +3
    rms_target_dbfs: -22            # M3: +6 dB above I1
  4:                                # Escalated — aggressive, loud
    style: "General"
    rate_multiplier: 1.10           # M15: consensus Anger [+4%,+12%]; variant: upper
    pitch_delta_st: +2              # M15: male pitch -1% to +5%
    volume_delta_db: +8
    rms_target_dbfs: -19            # M3: +9 dB above I1
  5:                                # Extreme — shouting, near-clipping
    style: "General"
    rate_multiplier: 1.14           # M15: consensus Shouting [+8%,+15%]; variant: mid-high
    pitch_delta_st: +2              # #64: was +3 (=18%); reduced to ~12% (consensus 0–5%)
    volume_delta_db: +13
    rms_target_dbfs: -15            # M3: +13 dB above I1 (satisfies ≥8 dB spec)

# --- Disfluency profile ---
# Probabilities for injecting realism markers into rendered speech.
disfluency:
  filled_pause_prob: 0.04           # P(אממ / אה before turn) — low; aggressor speaks deliberately
  false_start_prob: 0.02
  truncation_prob: 0.01             # Interrupted mid-word

# --- Split assignment ---
# Set at dataset generation time. Do not change after clips are generated.
split: train                        # train | val | test_synth
