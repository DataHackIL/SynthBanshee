# Speaker persona — Female victim, age 25–40, instance 002
# Used in She-Proves scenes (domestic violence context).

speaker_id: VIC_F_25-40_002
role: VIC
gender: female
age_range: "25-40"
context: she_proves

tts_voice_id: he-IL-HilaNeural
tts_provider: azure

prosody_baseline:
  rate: 0.95                        # Slightly slower — hesitant, guarded
  pitch_hz: 210                     # Female fundamental
  volume_db: -2                     # Quieter baseline than aggressor

style_map:
  1:
    style: "General"
    rate_multiplier: 1.0
    pitch_delta_st: 0
    volume_delta_db: 0
  2:                                # Tension — careful, watchful; slight vocal strain
    style: "General"
    rate_multiplier: 0.95
    pitch_delta_st: +1
    volume_delta_db: -1
  3:                                # Conflict — defensive, shaking voice
    style: "sad"                    # Azure "sad" approximates fear/distress for he-IL
    rate_multiplier: 0.90
    pitch_delta_st: +3
    volume_delta_db: -3
  4:                                # Escalated — pleading, high pitch, crying undertone
    style: "sad"
    rate_multiplier: 0.88
    pitch_delta_st: +5
    volume_delta_db: -2
  5:                                # Extreme — panic, screaming or sobbing
    style: "sad"
    rate_multiplier: 1.10           # Can speed up under panic
    pitch_delta_st: +7
    volume_delta_db: +4

disfluency:
  filled_pause_prob: 0.08           # Higher — victim is more hesitant, searches for words
  false_start_prob: 0.06
  truncation_prob: 0.05             # Often interrupted by aggressor

split: train
